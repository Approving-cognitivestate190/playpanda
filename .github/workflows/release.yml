name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-macos
          - x86_64-macos
          - aarch64-linux
          - x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.0"

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Package
        run: |
          ARCHIVE="playpanda-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE/scripts"
          cp zig-out/bin/playpanda "$ARCHIVE/"
          cp scripts/*.py "$ARCHIVE/scripts/"
          cp LICENSE README.md "$ARCHIVE/"
          tar -czf "$ARCHIVE.tar.gz" "$ARCHIVE"

      - uses: actions/upload-artifact@v4
        with:
          name: playpanda-${{ matrix.target }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > notes.md
            echo "" >> notes.md
            git log "$PREV_TAG..$TAG" --pretty=format:"- %s" >> notes.md
          else
            echo "## Initial release" > notes.md
          fi
          echo "" >> notes.md
          echo "## Install" >> notes.md
          echo '```' >> notes.md
          echo 'curl -fsSL https://raw.githubusercontent.com/ancs21/playpanda/main/scripts/install.sh | sh' >> notes.md
          echo '```' >> notes.md
          echo "" >> notes.md
          echo "## Checksums" >> notes.md
          echo '```' >> notes.md
          sha256sum artifacts/*.tar.gz >> notes.md
          echo '```' >> notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: artifacts/*.tar.gz
          generate_release_notes: false
